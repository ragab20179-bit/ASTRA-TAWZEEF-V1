name: EWOA Fire Drill

on:
  workflow_dispatch:

jobs:
  ewoa_fire_drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y dirmngr --install-recommends
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install Docker Compose
        run: |
          sudo apt-get install -y docker-compose

      - name: Start ASTRA Services
        run: docker-compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            if curl -s http://localhost:8000/health 2>/dev/null | grep -q 'ok'; then
              echo "ASTRA Core is ready!"
              break
            fi
            echo "Waiting for ASTRA Core... ($i/60  )"
            sleep 2
          done

      - name: Run Baseline Test
        run: docker-compose -f docker-compose.ewoa.yml run --rm k6 run /tests/01_k6_baseline.js

      - name: Run Overload Test
        id: overload-test
        run: |
          docker-compose -f docker-compose.ewoa.yml run --rm k6 run /tests/02_k6_overload.js 2>&1 | tee /tmp/k6-output.txt
          
      - name: Analyze Overload Test Results
        id: overload-test-analysis
        run: |
          echo "Analyzing overload test results..."
          P95_RAW=$(grep "http_req_duration" /tmp/k6-output.txt | awk '{for(i=1;i<=NF;i++  ){if($i~/^p\(95\)=/){gsub(/p\(95\)=/,"",$i); gsub(/ms.*/,"",$i); print $i}}}')
          if [ -z "$P95_RAW" ]; then
            echo "ERROR: Could not extract P95 value"
            echo "P95_LATENCY=0" >> $GITHUB_OUTPUT
            echo "violation_detected=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "P95_RAW=$P95_RAW"
          echo "P95_LATENCY=$P95_RAW" >> $GITHUB_OUTPUT
          VIOLATION=$(echo "$P95_RAW > 100" | bc -l)
          if [ "$VIOLATION" -eq 1 ]; then
            echo "VIOLATION DETECTED: P95=$P95_RAW ms > 100ms"
            echo "violation_detected=true" >> $GITHUB_OUTPUT
            echo "violation_value=$P95_RAW" >> $GITHUB_OUTPUT
          else
            echo "NO VIOLATION: P95=$P95_RAW ms <= 100ms"
            echo "violation_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate NCR
        if: steps.overload-test-analysis.outputs.violation_detected == 'true'
        run: |
          echo "Generating NCR..."
          mkdir -p 09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          NCR_ID="NCR_$(date +%s)"
          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/${NCR_ID}.md" << NCREOF
          # Non-Conformance Report (NCR)

          **NCR ID:** ${NCR_ID}
          **Timestamp:** ${TIMESTAMP}
          **Status:** OPEN

          ## Violation Details
          - **Invariant Violated:** Latency SLA
          - **Metric:** p95 latency
          - **Threshold:** 100ms
          - **Actual Value:** ${{ steps.overload-test-analysis.outputs.violation_value }}ms
          - **Component:** ASTRA Core
          - **Severity:** MAJOR

          ## Analysis
          - **Root Cause:** Overload test induced latency regression
          - **Impact:** EWOA fire drill detected the violation

          ## Actions Required
          1. Analyze performance under load
          2. Identify and optimize bottlenecks
          NCREOF
          echo "NCR generated: ${NCR_ID}.md"

      - name: Generate CAPA
        if: steps.overload-test-analysis.outputs.violation_detected == 'true'
        run: |
          echo "Generating CAPA..."
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          CAPA_ID="CAPA_$(date +%s)"
          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/${CAPA_ID}.md" << CAPAEOF
          # Corrective & Preventive Action (CAPA)

          **CAPA ID:** ${CAPA_ID}
          **Timestamp:** ${TIMESTAMP}
          **Status:** OPEN

          ## Root Cause
          Latency SLA violation detected during EWOA fire drill (p95 > 100ms)

          ## Corrective Action
          1. Analyze performance bottlenecks under load
          2. Optimize critical code paths

          ## Preventive Action
          1. Maintain latency guardrails in CI/CD
          2. Regularly run EWOA fire drills
          CAPAEOF
          echo "CAPA generated: ${CAPA_ID}.md"

      - name: Commit NCR/CAPA
        if: steps.overload-test-analysis.outputs.violation_detected == 'true'
        run: |
          echo "Committing NCR/CAPA..."
          git config user.email "ci@astra.local"
          git config user.name "ASTRA CI"
          git add 09_Reports_and_Outputs/NCR_CAPA/
          git commit -m "AUTO: NCR/CAPA for EWOA fire drill (p95=${{ steps.overload-test-analysis.outputs.violation_value }}ms)"
          git push

      - name: Cleanup Services
        if: always()
        run: docker-compose down
