name: EWOA Fire Drill

on:
  workflow_dispatch:

jobs:
  ewoa_fire_drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y dirmngr --install-recommends
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install Docker Compose
        run: |
          sudo apt-get install -y docker-compose

      - name: Start ASTRA Services
        run: docker-compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            if curl -s http://localhost:8000/health 2>/dev/null | grep -q 'ok'; then
              echo "ASTRA Core is ready!"
              break
            fi
            echo "Waiting for ASTRA Core... ($i/60  )"
            sleep 2
          done

      - name: Run Baseline Test
        id: baseline-test
        run: |
          docker-compose -f docker-compose.ewoa.yml run --rm k6 run /tests/01_k6_baseline.js 2>&1 | tee /tmp/k6-baseline-output.txt

      - name: Run Overload Test
        id: overload-test
        run: |
          docker-compose -f docker-compose.ewoa.yml run --rm k6 run /tests/02_k6_overload.js 2>&1 | tee /tmp/k6-overload-output.txt

      - name: EWOA Signal Evaluation
        id: ewoa-signal-evaluation
        run: |
          echo "Evaluating EWOA signals..."
          chmod +x ./tests/ewoa/generate_evidence_bundle.py
          P95_LATENCY=$(grep "http_req_duration" /tmp/k6-overload-output.txt | awk 
'{for(i=1;i<=NF;i++  ){if($i~/^p\\(95\\)=/){gsub(/p\\(95\\)=/,"",$i); gsub(/ms.*/,"",$i); print $i}}}')
          ERROR_RATE=$(grep "errors" /tmp/k6-overload-output.txt | awk '{print $2}' | sed 's/[()%]//g')
          DENIAL_RATE=$(grep "denials" /tmp/k6-overload-output.txt | awk '{print $2}' | sed 's/[()%]//g')
          
          # Generate evidence bundle
          ./tests/ewoa/generate_evidence_bundle.py $P95_LATENCY $ERROR_RATE $DENIAL_RATE > /tmp/ewoa_evidence_bundle.json
          
          # Check for high severity alerts
          if jq -e '.alerts[] | select(.severity == "HIGH" or .severity == "CRITICAL")' /tmp/ewoa_evidence_bundle.json > /dev/null; then
            echo "High severity alert detected!"
            echo "ncr_required=true" >> $GITHUB_OUTPUT
          else
            echo "No high severity alerts detected."
            echo "ncr_required=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate NCR
        if: steps.ewoa-signal-evaluation.outputs.ncr_required == 'true'
        run: |
          echo "Generating NCR..."
          mkdir -p 09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          NCR_ID="NCR_$(date +%s)"
          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/${NCR_ID}.md" << NCREOF
          # Non-Conformance Report (NCR)

          **NCR ID:** ${NCR_ID}
          **Timestamp:** ${TIMESTAMP}
          **Status:** OPEN

          ## Violation Details
          - **Invariant Violated:** Latency SLA
          - **Metric:** p95 latency
          - **Threshold:** 100ms
          - **Actual Value:** $(jq '.metrics.p95_latency_ms' /tmp/ewoa_evidence_bundle.json)ms
          - **Component:** ASTRA Core
          - **Severity:** $(jq '.alerts[] | select(.name == "High Latency") | .severity' /tmp/ewoa_evidence_bundle.json)

          ## Analysis
          - **Root Cause:** Overload test induced latency regression
          - **Impact:** EWOA fire drill detected the violation

          ## Actions Required
          1. Analyze performance under load
          2. Identify and optimize bottlenecks
          NCREOF
          echo "NCR generated: ${NCR_ID}.md"

      - name: Generate CAPA
        if: steps.ewoa-signal-evaluation.outputs.ncr_required == 'true'
        run: |
          echo "Generating CAPA..."
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          CAPA_ID="CAPA_$(date +%s)"
          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/${CAPA_ID}.md" << CAPAEOF
          # Corrective & Preventive Action (CAPA)

          **CAPA ID:** ${CAPA_ID}
          **Timestamp:** ${TIMESTAMP}
          **Status:** OPEN

          ## Root Cause
          Latency SLA violation detected during EWOA fire drill (p95 > 100ms)

          ## Corrective Action
          1. Analyze performance bottlenecks under load
          2. Optimize critical code paths

          ## Preventive Action
          1. Maintain latency guardrails in CI/CD
          2. Regularly run EWOA fire drills
          CAPAEOF
          echo "CAPA generated: ${CAPA_ID}.md"

      - name: Commit Evidence and Reports
        if: always()
        run: |
          echo "Committing evidence and reports..."
          git config user.email "ci@astra.local"
          git config user.name "ASTRA CI"
          mkdir -p tests/ewoa/evidence
          mv /tmp/ewoa_evidence_bundle.json tests/ewoa/evidence/
          git add tests/ewoa/evidence/
          git add 09_Reports_and_Outputs/NCR_CAPA/
          git commit -m "chore: Add EWOA fire drill evidence and reports"
          git push

      - name: Cleanup Services
        if: always()
        run: docker-compose down

