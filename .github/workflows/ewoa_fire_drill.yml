name: EWOA Fire Drill

on:
  workflow_dispatch:

jobs:
  ewoa_fire_drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y dirmngr --install-recommends
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install Docker Compose
        run: |
          sudo apt-get install -y docker-compose

      - name: Start ASTRA Services
        run: docker-compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            if curl -s http://localhost:8000/health 2>/dev/null | grep -q 'ok'; then
              echo "ASTRA Core is ready!"
              break
            fi
            echo "Waiting for ASTRA Core... ($i/60 )"
            sleep 2
          done

      - name: Run Baseline Test
        run: docker-compose -f docker-compose.ewoa.yml run --rm k6 run /tests/01_k6_baseline.js

      - name: Run Overload Test
        run: docker-compose -f docker-compose.ewoa.yml run --rm k6 run /tests/02_k6_overload.js

      - name: Run Chaos Test - ASTRA Down
        run: ./tests/ewoa/chaos_astra_down.sh

      - name: Run Chaos Test - Postgres Down
        run: ./tests/ewoa/chaos_pg_down.sh

      - name: Run Chaos Test - Postgres Latency
        run: ./tests/ewoa/chaos_pg_latency.sh

      - name: Package Evidence Bundle
        run: ./tests/ewoa/package_evidence.sh

      - name: Commit Evidence
        run: |
          git config user.name "EWOA Fire Drill"
          git config user.email "ci@astra.local"
          git add tests/ewoa/evidence/
          git commit -m "chore: Add EWOA fire drill evidence bundle"
          git push origin main

      - name: Cleanup Services
        if: always()
        run: docker-compose down
