name: EWOA Fire Drill

on:
  workflow_dispatch:

jobs:
  ewoa_fire_drill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (k6, jq, docker-compose)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq docker-compose dirmngr --install-recommends

          # Install k6 (official repo)
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Start ASTRA services
        run: |
          set -euo pipefail
          docker-compose up -d

      - name: Wait for ASTRA Core health
        run: |
          set -euo pipefail
          echo "Waiting for ASTRA Core..."
          for i in {1..60}; do
            if curl -s http://localhost:8000/health 2>/dev/null | grep -q 'ok'; then
              echo "ASTRA Core is ready."
              exit 0
            fi
            echo "Waiting... ($i/60 )"
            sleep 2
          done
          echo "ASTRA Core did not become healthy in time."
          docker-compose ps
          exit 1

      - name: Wait for Orchestrator health
        run: |
          set -euo pipefail
          echo "Waiting for Orchestrator..."
          for i in {1..60}; do
            if curl -s http://localhost:8001/health 2>/dev/null | grep -qi 'ok'; then
              echo "Orchestrator is ready."
              exit 0
            fi
            echo "Waiting... ($i/60 )"
            sleep 2
          done
          echo "Orchestrator did not become healthy in time."
          docker-compose ps
          exit 1

      - name: Run Baseline Test (host k6)
        env:
          BASE_URL: http://localhost:8001
        run: |
          set -euo pipefail
          k6 run ./tests/ewoa/01_k6_baseline.js \
            --summary-export /tmp/k6-baseline-summary.json \
            2>&1 | tee /tmp/k6-baseline-output.txt

      - name: Run Overload Test (host k6 )
        env:
          BASE_URL: http://localhost:8001
        run: |
          set -euo pipefail
          k6 run ./tests/ewoa/02_k6_overload.js \
            --summary-export /tmp/k6-overload-summary.json \
            2>&1 | tee /tmp/k6-overload-output.txt

      - name: EWOA Signal Evaluation & Evidence Generation
        id: ewoa-signal-evaluation
        run: |
          set -euo pipefail

          echo "Evaluating EWOA signals from k6 summary JSON..."

          # --- Extract stable numeric metrics from k6 JSON ---
          P95_LATENCY=$(jq -r '.metrics.http_req_duration.values["p(95 )"] // 0' /tmp/k6-overload-summary.json)

          # Defensive check for P95 value
          if [ "$(printf "%.0f" "$P95_LATENCY")" -eq 0 ]; then
            echo "WARNING: P95_LATENCY parsed as 0. This may indicate an issue."
            echo "--- Available http_req_duration keys in k6 summary --- "
            jq -r '.metrics.http_req_duration.values | keys_unsorted' /tmp/k6-overload-summary.json || echo "jq command failed or file not found"
          fi

          HTTP_FAIL_RATE=$(jq -r '.metrics.http_req_failed.values.rate // 0' /tmp/k6-overload-summary.json )

          # Custom metric: denials (defensive)
          DENIAL_COUNT=$(jq -r '
            .metrics.denials.values.count //
            .metrics.denials.values["count"] //
            0
          ' /tmp/k6-overload-summary.json)
          ITERATIONS=$(jq -r '.metrics.iterations.values.count // 1' /tmp/k6-overload-summary.json)
          DENIAL_RATE=$(jq -n --argjson d "$DENIAL_COUNT" --argjson i "$ITERATIONS" 'if $i==0 then 0 else ($d / $i) end')

          # Normalize numeric formatting
          P95_LATENCY=$(printf "%.6f" "$P95_LATENCY")
          HTTP_FAIL_RATE=$(printf "%.6f" "$HTTP_FAIL_RATE")
          DENIAL_RATE=$(printf "%.6f" "$DENIAL_RATE")

          echo "P95 Latency (ms): $P95_LATENCY"
          echo "HTTP Fail Rate:   $HTTP_FAIL_RATE"
          echo "Denial Rate:      $DENIAL_RATE"

          # --- Generate Evidence Bundle ---
          python3 ./tests/ewoa/generate_evidence_bundle.py \
            "$P95_LATENCY" "$HTTP_FAIL_RATE" "$DENIAL_RATE" \
            > /tmp/ewoa_evidence_bundle.json

          echo "--- Generated Evidence Bundle ---"
          cat /tmp/ewoa_evidence_bundle.json
          echo "--- End of Evidence Bundle ---"

          # Determine whether NCR is required
          if jq -e '.summary.result == "FAIL"' /tmp/ewoa_evidence_bundle.json > /dev/null; then
            echo "Drill failed! NCR required."
            echo "ncr_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "Drill passed. No NCR required."
            echo "ncr_required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate NCR
        if: steps.ewoa-signal-evaluation.outputs.ncr_required == 'true'
        run: |
          set -euo pipefail
          echo "Generating NCR..."
          mkdir -p 09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          NCR_ID="NCR_$(date +%s)"

          ALERT_ID=$(jq -r '.alerts[0].alert_id // "UNKNOWN_ALERT"' /tmp/ewoa_evidence_bundle.json)
          SEVERITY=$(jq -r '.alerts[0].severity // "UNKNOWN"' /tmp/ewoa_evidence_bundle.json)
          CONDITION=$(jq -r '.alerts[0].condition // "UNKNOWN"' /tmp/ewoa_evidence_bundle.json)
          ACTUAL=$(jq -r '.signals[] | select(.signal_id=="exec_latency_p95") | .value' /tmp/ewoa_evidence_bundle.json || echo "UNKNOWN")

          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/${NCR_ID}.md" << NCREOF
          # Non-Conformance Report (NCR)

          **NCR ID:** ${NCR_ID}  
          **Timestamp:** ${TIMESTAMP}  
          **Status:** OPEN  

          ## Violation Details
          - **Invariant Violated:** ${ALERT_ID}
          - **Threshold:** ${CONDITION}
          - **Actual Value:** ${ACTUAL}ms
          - **Component:** ASTRA/TAWZEEF Hot Path
          - **Severity:** ${SEVERITY}

          ## Evidence
          - Evidence Bundle: tests/ewoa/evidence/ewoa_evidence_bundle.json (this run)

          ## Actions Required
          1. Run performance analysis under load
          2. Identify bottleneck (DB insert, ASTRA decision latency, orchestration)
          3. Propose corrective action (Repair Plan Generator Phase 2)
          NCREOF

          echo "NCR generated: ${NCR_ID}.md"

      - name: Generate CAPA
        if: steps.ewoa-signal-evaluation.outputs.ncr_required == 'true'
        run: |
          set -euo pipefail
          echo "Generating CAPA..."
          mkdir -p 09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          CAPA_ID="CAPA_$(date +%s)"

          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/${CAPA_ID}.md" << CAPAEOF
          # Corrective & Preventive Action (CAPA)

          **CAPA ID:** ${CAPA_ID}  
          **Timestamp:** ${TIMESTAMP}  
          **Status:** OPEN  

          ## Root Cause (to be validated)
          Latency/availability violation detected during EWOA fire drill.

          ## Corrective Action
          1. Identify bottleneck in hot path
          2. Optimize (no retries, no async in gate path)
          3. Re-run fire drill until PASS

          ## Preventive Action
          1. Keep latency guardrails enforced in CI
          2. Schedule regular EWOA fire drills
          3. Track p95/p99 trends (EWOA)
          CAPAEOF

          echo "CAPA generated: ${CAPA_ID}.md"

      - name: Save evidence into repo
        if: always()
        run: |
          set -euo pipefail
          mkdir -p tests/ewoa/evidence
          # Keep latest evidence at a stable name + timestamped copy
          cp /tmp/ewoa_evidence_bundle.json tests/ewoa/evidence/ewoa_evidence_bundle.json || true
          cp /tmp/ewoa_evidence_bundle.json tests/ewoa/evidence/ewoa_evidence_bundle_$(date +'%Y-%m-%d-%H-%M-%S').json || true

      - name: Upload k6 summaries + evidence as workflow artifacts (debuggable)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ewoa-fire-drill-artifacts
          path: |
            /tmp/k6-baseline-summary.json
            /tmp/k6-overload-summary.json
            /tmp/k6-baseline-output.txt
            /tmp/k6-overload-output.txt
            /tmp/ewoa_evidence_bundle.json
            tests/ewoa/evidence/

      - name: Commit evidence and NCR/CAPA to repo
        if: always()
        run: |
          set -euo pipefail
          git config user.email "ci@astra.local"
          git config user.name "ASTRA CI"

          git add tests/ewoa/evidence/ || true
          git add 09_Reports_and_Outputs/NCR_CAPA/ || true

          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: EWOA fire drill evidence $(date +'%Y-%m-%d-%H-%M-%S')"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Cleanup services
        if: always()
        run: docker-compose down
