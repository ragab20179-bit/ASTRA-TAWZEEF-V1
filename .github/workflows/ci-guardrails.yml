name: ci-guardrails

on:
  push:
    branches: [ main ]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Static Guardrails Scan
        run: |
          FORBIDDEN_REGEX="[async|io|timeout|s|threading|b|\\multiprocessing|b|\\celery|b|\\redis|*"
          if grep -rind "$FORBIDDEN_REGEX" services shared 2>/dev/null; then
            echo "❌ Forbidden construct detected"
            exit 1
          fi
          echo "✓ Static scan passed"

      - name: Build Docker images
        run: |
          docker build -f services/astra_core/Dockerfile -t astra-core:latest .
          docker build -f services/execution_orchestrator/Dockerfile -t orchestrator:latest .
          docker build -f services/watcher_chair/Dockerfile -t watcher:latest .

      - name: Start services
        run: docker-compose up -d

      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000/health | grep -q '"ok":true' && break
            sleep 2
          done

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run latency test
        id: latency-test
        run: |
          cat > /tmp/latency-test.js << 'K6_SCRIPT'
          import http from 'k6/http';
          import { check } from 'k6';
          
          function generateUUID( ) {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
              const r = Math.random() * 16 | 0;
              const v = c === 'x' ? r : (r & 0x3 | 0x8);
              return v.toString(16);
            });
          }
          
          export const options = {
            stages: [
              { duration: '1m', target: 2 },
              { duration: '1m', target: 2 },
              { duration: '1m', target: 0 },
            ],
          };
          
          export default function () {
            const res = http.post('http://localhost:8001/v2/orchestrator/execute', JSON.stringify({
              request_id: generateUUID( ),
              actor: { id: 'test', role: 'recruiter' },
              context: { domain: 'interview', action: 'start', consent: true }
            }), {
              headers: { 'Content-Type': 'application/json' },
            });
            check(res, { 'status 200': (r) => r.status === 200 });
          }
          K6_SCRIPT
          
          k6 run /tmp/latency-test.js 2>&1 | tee /tmp/k6-output.txt
          
          # Extract p95 latency
          P95=$(grep "p(95)" /tmp/k6-output.txt | grep "http_req_duration" | awk '{print $NF}' | sed 's/ms//' | head -1 )
          echo "P95_LATENCY=$P95" >> $GITHUB_OUTPUT
          
          if (( $(echo "$P95 > 100" | bc -l) )); then
            echo "violation_detected=true" >> $GITHUB_OUTPUT
            echo "violation_value=$P95" >> $GITHUB_OUTPUT
          else
            echo "violation_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate NCR
        if: steps.latency-test.outputs.violation_detected == 'true'
        run: |
          mkdir -p 09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/NCR_$(date +%s).md" << EOF
          # Non-Conformance Report (NCR)
          **NCR ID:** NCR_$(date +%s)
          **Timestamp:** $TIMESTAMP
          **Status:** OPEN
          **Invariant Violated:** Latency SLA
          **Metric:** p95 latency
          **Threshold:** 100ms
          **Actual Value:** ${{ steps.latency-test.outputs.violation_value }}ms
          **Component:** ASTRA Core
          **Severity:** MAJOR
          **Root Cause:** Code change introduced latency
          **Impact:** Deployment blocked
          EOF

      - name: Generate CAPA
        if: steps.latency-test.outputs.violation_detected == 'true'
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          cat > "09_Reports_and_Outputs/NCR_CAPA/$(date +%Y-%m-%d)/CAPA_$(date +%s).md" << EOF
          # Corrective & Preventive Action (CAPA)
          **CAPA ID:** CAPA_$(date +%s)
          **Timestamp:** $TIMESTAMP
          **Status:** OPEN
          **NCR Reference:** Latest NCR
          **Root Cause:** Latency SLA violation detected
          **Corrective Action:** Investigate and fix latency issue in code
          **Preventive Action:** Maintain latency guardrail in CI pipeline
          **Owner:** Engineering Team
          **Target Resolution:** 24 hours
          EOF

      - name: Commit NCR/CAPA
        if: steps.latency-test.outputs.violation_detected == 'true'
        run: |
          git config user.email "ci@astra.local"
          git config user.name "ASTRA CI"
          git add 09_Reports_and_Outputs/NCR_CAPA/
          git commit -m "AUTO: NCR/CAPA for latency violation" || true
          git push origin main || true

      - name: Fail pipeline on violation
        if: steps.latency-test.outputs.violation_detected == 'true'
        run: |
          echo "❌ PIPELINE FAILED: Latency SLA violated"
          echo "P95 Latency: ${{ steps.latency-test.outputs.violation_value }}ms (threshold: 100ms)"
          echo "NCR and CAPA auto-generated and committed"
          exit 1

      - name: Cleanup
        if: always()
        run: docker-compose down || true
