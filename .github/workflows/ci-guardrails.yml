name: ci-guardrails

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Static Guardrails Scan
        run: |
          set -e
          FORBIDDEN_REGEX="[async|io|timeout|s|threading|b|\\multiprocessing|b|\\celery|b|\\redis|*"
          if grep -rind "$FORBIDDEN_REGEX" services shared; then
              echo "Forbidden construct detected."
              exit 1
          fi
          echo "✓ Static scan passed."

      - name: Build Docker images
        run: |
          docker build -f services/astra_core/Dockerfile -t astra-core .
          docker build -f services/execution_orchestrator/Dockerfile -t orchestrator .
          docker build -f services/watcher_shell/Dockerfile -t watcher .

      - name: Start services
        run: |
          docker-compose up -d
          for i in {1..30}; do
            curl -s http://localhost:8000/health | grep -q '"ok":true' && break
            sleep 2
          done
          for i in {1..30}; do
            curl -s http://localhost:8001/health | grep -q '"ok":true' && break
            sleep 2
          done

      - name: Install k6
        run: sudo apt-get update -qq && sudo apt-get install -y -qq k6

      - name: Run k6 latency test
        id: k6-test
        run: |
          cat > /tmp/latency_test.js << 'EOFK6'
          import http from 'k6/http';
          import { check, sleep } from 'k6';
          function generateUUID( ) {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
              const r = Math.random() * 16 | 0;
              const v = c === 'x' ? r : (r & 0x3 | 0x8);
              return v.toString(16);
            });
          }
          export const options = {
            stages: [
              { duration: '1m', target: 2 },
              { duration: '1m', target: 2 },
              { duration: '1m', target: 0 },
            ],
          };
          export default function () {
            const res = http.post('http://localhost:8001/v2/orchestrator/execute', JSON.stringify({
              request_id: generateUUID( ),
              actor: { id: 'ci-test', role: 'recruiter' },
              context: { domain: 'interview', action: 'start', consent: true }
            }), {
              headers: { 'Content-Type': 'application/json' },
            });
            check(res, {
              'status is 200': (r) => r.status === 200,
              'outcome is EXECUTED': (r) => r.json('outcome') === 'EXECUTED',
            });
            sleep(1);
          }
          EOFK6
          k6 run /tmp/latency_test.js --out json=/tmp/k6-results.json 2>&1 | tee /tmp/k6-output.txt
          P95_LATENCY=$(grep "p(95)" /tmp/k6-output.txt | grep -oE "[0-9]+(\.[0-9]+)?ms" | head -1 | sed 's/ms//')
          echo "P95_LATENCY=$P95_LATENCY" >> $GITHUB_OUTPUT
          SUCCESS_RATE=$(grep "checks_succeeded" /tmp/k6-output.txt | grep -oE "[0-9]+\.[0-9]+%" | head -1 || echo "N/A")
          echo "SUCCESS_RATE=$SUCCESS_RATE" >> $GITHUB_OUTPUT

      - name: Validate latency SLA
        id: sla-check
        run: |
          P95_LATENCY="${{ steps.k6-test.outputs.P95_LATENCY }}"
          SLA_THRESHOLD=100
          P95_NUM=$(echo "$P95_LATENCY" | cut -d'.' -f1)
          if [ "$P95_NUM" -gt "$SLA_THRESHOLD" ]; then
            echo "violation_detected=true" >> $GITHUB_OUTPUT
            echo "violation_type=latency_degradation" >> $GITHUB_OUTPUT
            echo "violation_value=$P95_LATENCY" >> $GITHUB_OUTPUT
            echo "violation_threshold=$SLA_THRESHOLD" >> $GITHUB_OUTPUT
          else
            echo "violation_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Auto-generate NCR on violation
        if: steps.sla-check.outputs.violation_detected == 'true'
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%d_%H-%M-%S')
          NCR_DIR="09_Reports_and_Outputs/NCR_CAPA/$TIMESTAMP"
          mkdir -p "$NCR_DIR"
          NCR_ID="NCR_$(date +%s)"
          cat > "$NCR_DIR/${NCR_ID}.md" << EOF
          # Non-Conformance Report (NCR)
          **NCR ID:** $NCR_ID
          **Timestamp:** $TIMESTAMP
          **Severity:** MAJOR
          **Invariant Violated:** ${{ steps.sla-check.outputs.violation_type }}
          **Observed Value:** ${{ steps.sla-check.outputs.violation_value }}ms
          **Threshold:** ${{ steps.sla-check.outputs.violation_threshold }}ms
          **Status:** OPEN
          EOF

      - name: Auto-generate CAPA on violation
        if: steps.sla-check.outputs.violation_detected == 'true'
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%d_%H-%M-%S')
          CAPA_DIR="09_Reports_and_Outputs/NCR_CAPA/$TIMESTAMP"
          CAPA_ID="CAPA_$(date +%s)"
          cat > "$CAPA_DIR/${CAPA_ID}.md" << EOF
          # Corrective & Preventive Action (CAPA)
          **CAPA ID:** $CAPA_ID
          **Timestamp:** $TIMESTAMP
          **Status:** OPEN
          **Root Cause:** Latency SLA violation - ${{ steps.sla-check.outputs.violation_type }}
          **Corrective Action:** Investigate and fix latency issue
          **Preventive Action:** Maintain latency guardrail in CI
          EOF

      - name: Commit NCR/CAPA
        if: steps.sla-check.outputs.violation_detected == 'true'
        run: |
          git config user.email "ci@astra.local"
          git config user.name "ASTRA CI"
          git add 09_Reports_and_Outputs/NCR_CAPA/
          git commit -m "AUTO-GENERATED: NCR/CAPA for latency violation" || true
          git push origin main || true

      - name: Fail pipeline on violation
        if: steps.sla-check.outputs.violation_detected == 'true'
        run: |
          echo "❌ PIPELINE FAILURE: Latency SLA violated"
          exit 1

      - name: Cleanup
        if: always()
        run: docker-compose down || true
